name: CI Angular

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install
        working-directory: ./front

      - name: Build du projet
        run: npm run build -- --configuration production
        working-directory: ./front

      - name: Lancer les tests avec coverage
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: ./front

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./front/coverage

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build & tests backend
        run: mvn clean verify
        working-directory: ./back

      - name: Upload coverage backend
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: ./back/target/site/jacoco

      - name: Debug lcov
        run: |
          echo "===== LCOV ====="
          head -50 front/coverage/bobapp/lcov.info

        

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=totodej_BobApp
            -Dsonar.organization=totodej
            -Dsonar.sources=front/src,back/src/main/java
            -Dsonar.tests=front/src,back/src/test/java
            -Dsonar.test.inclusions=front/src/**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=front/coverage/bobapp/lcov.info
            -Dsonar.java.binaries=back/target/classes
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.coverage.jacoco.xmlReportPaths=back/target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=src/environments/**,src/main.ts,src/test.ts,**/*.spec.ts
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
